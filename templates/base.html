<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Second Brain OS</title>

    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">

    <meta name="theme-color" content="#090b1f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Second Brain">

    <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>

<body class="{{ theme }}">

<header>
    <div class="title-row">
        <div class="title">🧠 Second Brain</div>

        {% if profile and stats %}
        <div class="top-mini-stats">
            <span>🏆 {{ stats.achievements }}</span>
            <span>📚 {{ stats.library }}</span>
            <span>🪙 {{ profile.coins }}</span>
            <span>📅 {{ stats.login }}</span>
        </div>
        {% endif %}
    </div>

    <nav class="tabs" id="tabs">
        <a href="/" data-path="/">ホーム</a>
        <a href="/library" data-path="/library">Library</a>
        <a href="/achievements" data-path="/achievements">実績</a>
        <a href="/stats" data-path="/stats">統計</a>
        <a href="/calendar" data-path="/calendar">カレンダー</a>
        <a href="/goals" data-path="/goals">目標</a>
        <a href="/shop" data-path="/shop">ショップ</a>
        <a href="/settings" data-path="/settings">設定</a>
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<script>
const currentPath = window.location.pathname;
const tabs = document.getElementById("tabs");

if (tabs) {
    const links = tabs.querySelectorAll("a");

    links.forEach(link => {
        const path = link.dataset.path;

        if (
            currentPath === path ||
            (path !== "/" && currentPath.startsWith(path))
        ) {
            link.classList.add("active-tab");

            setTimeout(() => {
                link.scrollIntoView({
                    behavior: "smooth",
                    inline: "center",
                    block: "nearest"
                });
            }, 100);
        }
    });
}
</script>

</body>
</html>
