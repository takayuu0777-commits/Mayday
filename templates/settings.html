{% extends "base.html" %}

{% block content %}

<section class="card">
    <div class="section-head">
        <h2>⚙️ 設定</h2>
        <span class="pill">Customize</span>
    </div>
</section>

<form method="post" action="/settings">

<section class="card">
    <h2>🎨 テーマ</h2>

    <div class="theme-grid">
        {% for theme_item in themes %}
            <label class="theme-card">
                <input
                    type="radio"
                    name="theme"
                    value="{{ theme_item.class }}"
                    {% if current_theme == theme_item.class %}checked{% endif %}
                >

                <div>
                    <strong>{{ theme_item.name }}</strong>
                    <small>{{ theme_item.description }}</small>
                    <small>無料</small>
                </div>
            </label>
        {% endfor %}
    </div>
</section>

<section class="card">
    <h2>⚙️ 任意カテゴリ</h2>
    <p class="muted">使うものだけONにします。ONにした項目だけ今後ホーム・実績・入力欄に表示します。</p>

    <div class="setting-list">
        {% for category in categories %}
            <label class="setting-row">
                <span>{{ category.icon }} {{ category.name }}</span>
                <input type="checkbox" name="{{ category.id }}" {% if category.enabled %}checked{% endif %}>
            </label>
        {% endfor %}
    </div>
</section>

<section class="card">
    <button>設定を保存する ✨</button>
</section>

</form>

{% endblock %}
