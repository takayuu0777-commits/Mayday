{% extends "base.html" %}

{% block content %}

<section class="card">
    <div class="section-head">
        <h2>🛍 ショップ</h2>
        <span class="pill">無料開放中</span>
    </div>

    <p class="muted">
        Version2.7では、テーマはすべて無料で試せます。
    </p>
</section>

<section class="card">
    <h2>🎨 テーマ一覧</h2>

    <div class="list-grid">
        {% for theme in themes %}
            <div class="list-card shop-card">
                <strong>{{ theme.name }}</strong>
                <small>{{ theme.description }}</small>
                <small>無料</small>
            </div>
        {% endfor %}
    </div>
</section>

<section class="card">
    <a class="card-link" href="/settings">設定でテーマを変更する</a>
</section>

{% endblock %}
