{% extends "base.html" %}

{% block content %}

<section class="card profile-card {{ profile.background }}">
    <div class="profile-top">
        <div class="profile-icon">{{ profile.icon }}</div>

        <div>
            <div class="sub">Profile</div>
            <h1>{{ profile.title }}</h1>

            {% if profile.bio %}
                <p>{{ profile.bio }}</p>
            {% else %}
                <p class="muted">自己紹介はまだありません。</p>
            {% endif %}
        </div>
    </div>
</section>

<section class="card">
    <h2>👤 プロフィール編集</h2>

    <form method="post" action="/profile" class="stack-form">

        <label>称号</label>
        <select name="title">
            {% for title in titles %}
                <option value="{{ title }}" {% if profile.title == title %}selected{% endif %}>
                    {{ title }}
                </option>
            {% endfor %}
        </select>

        <label>アイコン</label>
        <select name="icon">
            {% for icon in icons %}
                <option value="{{ icon }}" {% if profile.icon == icon %}selected{% endif %}>
                    {{ icon }}
                </option>
            {% endfor %}
        </select>

        <label>背景</label>
        <select name="background">
            {% for background in backgrounds %}
                <option value="{{ background.class }}" {% if profile.background == background.class %}selected{% endif %}>
                    {{ background.name }}
                </option>
            {% endfor %}
        </select>

        <label>自己紹介</label>
        <textarea name="bio" placeholder="自己紹介を書きましょう">{{ profile.bio }}</textarea>

        <button>保存する ✨</button>
    </form>
</section>

{% endblock %}
