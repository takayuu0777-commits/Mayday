{% extends "base.html" %}

{% block content %}

<section class="card profile-card">
    <div class="profile-top">
        <div class="profile-icon">
            {{ profile.icon }}
        </div>

        <div>
            <div class="sub">Profile</div>
            <h1>{{ profile.title }}</h1>
            <p>称号を変更できます。</p>
        </div>
    </div>
</section>

<section class="card">
    <h2>🏷 称号変更</h2>

    <form method="post" action="/profile" class="stack-form">
        <select name="title">
            {% for title in titles %}
                <option value="{{ title }}" {% if profile.title == title %}selected{% endif %}>
                    {{ title }}
                </option>
            {% endfor %}
        </select>

        <button>称号を変更する ✨</button>
    </form>
</section>

<section class="card">
    <a class="card-link" href="/">ホームへ戻る</a>
</section>

{% endblock %}
