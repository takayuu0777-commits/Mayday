{% extends "base.html" %}

{% block content %}

<section class="card profile-card">
    <div class="profile-top">
        <div class="profile-icon">
            {{ profile.icon }}
        </div>

        <div>
            <div class="sub">Profile</div>
            <h1>{{ profile.title }}</h1>
            <p>称号とアイコンを変更できます。</p>
        </div>
    </div>
</section>

<section class="card">
    <h2>🏷 プロフィール変更</h2>

    <form method="post" action="/profile" class="stack-form">

        <label>称号</label>
        <select name="title">
            {% for title in titles %}
                <option value="{{ title }}" {% if profile.title == title %}selected{% endif %}>
                    {{ title }}
                </option>
            {% endfor %}
        </select>

        <label>アイコン</label>
        <select name="icon">
            {% for icon in icons %}
                <option value="{{ icon }}" {% if profile.icon == icon %}selected{% endif %}>
                    {{ icon }}
                </option>
            {% endfor %}
        </select>

        <button>プロフィールを保存する ✨</button>
    </form>
</section>

<section class="card">
    <a class="card-link" href="/">ホームへ戻る</a>
</section>

{% endblock %}
