{% extends "base.html" %}

{% block content %}

<section class="card">
    <div class="section-head">
        <h2>🛒 買い物</h2>
        <span class="pill">未購入のみ表示</span>
    </div>

    <form method="post" action="/shopping/add" class="stack-form">
        <input name="name" placeholder="買うもの">
        <button>追加する</button>
    </form>
</section>

<section class="card">
    <h2>未購入リスト</h2>

    {% if items %}
        {% for item in items %}
            <form method="post" action="/shopping/done/{{ item.id }}" class="compact-form-row">
                <span>{{ guess_icon(item.name) }} {{ item.name }}</span>
                <button>購入済み</button>
            </form>
        {% endfor %}
    {% else %}
        <p class="muted">買うものはありません。</p>
    {% endif %}
</section>

{% endblock %}
