{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>🧠 Second Brain</h2>
    <div>🏷 無称号</div>
    <div>🪙 100 コイン</div>
    <div>🏆 実績 0 / 1000</div>
</div>

<div class="card input">
    <form method="post" action="/add">
        <textarea name="text" placeholder="思考を入力"></textarea>
        <button>残す</button>
    </form>
</div>

<div class="card">
    <h3>🆕 最近の記録</h3>
</div>

{% for log in logs %}
<div class="card">
    <div class="meta">{{ log.created_at }} / {{ log.category }}</div>
    <div class="text">{{ log.text }}</div>
</div>
{% endfor %}

{% endblock %}
